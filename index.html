<!doctype html>
<html>
<head>
  <title>Felix Online ECCR Demo</title>
  <style>
    body{
      margin:0;
      font-family: Arial;
      background-color:#ebe9e4;
    }

    .toolbar{
      background: linear-gradient(to bottom, #8DD1FA 0%, #ffffff 50%, #8DD1FA 100%);
      padding:4px;
      display:flex;
      align-items:center;
      gap:4px;
    }

    .toolbar-btn{
      margin-left:20px;
      padding:6px 8px;
      background:none;
      border:none;
      color:#000;
      cursor:pointer;
      font-weight:500;
    }

    .toolbar-btn:hover{
      text-decoration:underline;
    }

    .dropdown{
      position:relative;
    }

    .dropbtn{
      padding:6px 22px;
      background:linear-gradient(to bottom,#c9eaff,#8DD1FA);
      color:#000;
      border:1px solid #6bb9e8;
      cursor:pointer;
      border-radius:3px;
      font-weight:bold;
    }

    .dropbtn:hover{
      background:linear-gradient(to bottom,#ffffff,#c9eaff);
    }

    .dropdown-content{
      display:none;
      position:absolute;
      background:#ffffff;
      min-width:160px;
      border:1px solid #6bb9e8;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
    }

    .dropdown-content a{
      color:#000;
      padding:8px 12px;
      display:block;
      text-decoration:none;
    }

    .dropdown-content a:hover{
      background:#c9eaff;
      text-decoration:underline;
    }

    .dropdown:hover .dropdown-content{
      display:block;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="dropdown">
        <button class="dropbtn"><img src="mainpagelogodemo.png"></button>
        <div class="dropdown-content">
            <a href="#">Home</a>
            <a href="#">Dashboard</a>
            <a href="#">Report</a>
        </div>
    </div>
    <button class="toolbar-btn">New Case +</button>
  </div>
</body>
</html>
